<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>St. Andrew's Point Cemetery - 2D Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root {
      --bg: #f7f4ef;
      --ink: #132028;
      --accent: #0f766e;
      --card: #fffdf8;
    }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at 10% 10%, #efe6d8, var(--bg));
      color: var(--ink);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      padding: 12px 16px;
      background: linear-gradient(90deg, #fff8ec, #f8f3ea);
      border-bottom: 1px solid #d9ccb8;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }
    p { margin: 0; font-size: 0.9rem; }
    #map { height: 100%; width: 100%; }
    .legend {
      background: var(--card);
      border: 1px solid #cabfae;
      border-radius: 8px;
      padding: 8px 10px;
      line-height: 1.3;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
      font-size: 12px;
    }
    .overview-card {
      background: var(--card);
      border: 1px solid #cabfae;
      border-radius: 10px;
      padding: 8px;
      width: 260px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.2);
    }
    .overview-title {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      letter-spacing: 0.01em;
    }
    .overview-map {
      width: 100%;
      height: 190px;
      border: 1px solid #d8cdbd;
      border-radius: 8px;
      overflow: hidden;
      background: #eceff1;
    }
    .overview-note {
      margin-top: 6px;
      font-size: 11px;
      color: #475569;
    }
    .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
    .subtle { color:#46535b; }
    @media (max-width: 720px) {
      .overview-card {
        width: 200px;
        padding: 6px;
      }
      .overview-map {
        height: 140px;
      }
      .overview-note {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>St. Andrew's Point Pioneer Cemetery - 2D Interactive Map</h1>
    <p class="subtle">OpenTopoMap base with local NRCan 1m hillshade overlay and georeferenced points derived from grid coordinates.</p>
  </header>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const map = L.map('map', {
      center: [46.15973, -62.52552],
      zoom: 18,
      minZoom: 14,
      maxZoom: 20
    });

    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      subdomains: ['a', 'b', 'c'],
      maxNativeZoom: 17,
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors, SRTM | Map style: OpenTopoMap (CC-BY-SA)'
    }).addTo(map);

    const osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors'
    });

    const hillshade = L.tileLayer('./tiles/nrcan_hillshade/{z}/{x}/{y}.png', {
      opacity: 0.45,
      maxNativeZoom: 19,
      maxZoom: 20,
      attribution: 'Hillshade: NRCan HRDEM 1m (PEI 2020)'
    }).addTo(map);

    const surfaceLayer = L.layerGroup().addTo(map);
    const subterraneanLayer = L.layerGroup().addTo(map);
    const anchorLayer = L.layerGroup().addTo(map);
    let overviewMap = null;

    const lidarCoverageBounds = L.latLngBounds(
      [46.149382, -62.535577952380955],
      [46.169855, -62.515444]
    );

    function popupHtml(props) {
      const parts = [
        `<b>${props.point_type || 'point'} #${props.point_id ?? ''}</b>`,
        `Source: ${props.source_sheet}`,
        `Grid (Y/X): ${props.northing_y ?? '-'} / ${props.easting_x ?? '-'}`
      ];
      if (props.category) parts.push(`Category: ${props.category}`);
      if (props.grid_context) parts.push(`Context: ${props.grid_context}`);
      if (props.elevation !== undefined) parts.push(`Elevation: ${props.elevation}`);
      return parts.join('<br>');
    }

    function styleFor(type) {
      if (type === 'surface') return { radius: 5, color: '#1f2937', weight: 1, fillColor: '#f59e0b', fillOpacity: 0.9 };
      if (type === 'subterranean') return { radius: 4, color: '#0b2239', weight: 1, fillColor: '#16a34a', fillOpacity: 0.85 };
      return { radius: 6, color: '#7c2d12', weight: 2, fillColor: '#ef4444', fillOpacity: 0.95 };
    }

    function initOverviewCard() {
      const OverviewControl = L.Control.extend({
        onAdd() {
          const container = L.DomUtil.create('div', 'overview-card');
          container.innerHTML = `
            <p class="overview-title">Prince Edward Island Overview</p>
            <div id="pei-overview-map" class="overview-map"></div>
            <div class="overview-note">Soft amber feather marks the LiDAR coverage transition.</div>
          `;
          L.DomEvent.disableClickPropagation(container);
          L.DomEvent.disableScrollPropagation(container);
          return container;
        }
      });

      map.addControl(new OverviewControl({ position: 'bottomleft' }));

      overviewMap = L.map('pei-overview-map', {
        zoomControl: false,
        attributionControl: false,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        keyboard: false,
        tap: false,
        touchZoom: false
      });

      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(overviewMap);

      const peiBounds = L.latLngBounds(
        [45.9, -64.5],
        [47.2, -61.8]
      );
      overviewMap.fitBounds(peiBounds);
      L.rectangle(peiBounds, {
        color: '#64748b',
        weight: 1,
        fillOpacity: 0,
        interactive: false
      }).addTo(overviewMap);

      renderFeatheredLidarZone();
    }

    function renderFeatheredLidarZone() {
      if (!overviewMap) return;

      const featherLayer = L.layerGroup().addTo(overviewMap);
      const featherPads = [0.75, 0.52, 0.34, 0.2, 0.1, 0.03];
      const featherOpacity = [0.02, 0.035, 0.05, 0.07, 0.09, 0.12];
      featherPads.forEach((pad, idx) => {
        L.rectangle(lidarCoverageBounds.pad(pad), {
          color: '#f59e0b',
          weight: 0,
          fillColor: '#f59e0b',
          fillOpacity: featherOpacity[idx],
          interactive: false
        }).addTo(featherLayer);
      });

      L.rectangle(lidarCoverageBounds, {
        color: '#f59e0b',
        weight: 0,
        fillColor: '#f59e0b',
        fillOpacity: 0.14,
        interactive: false
      }).addTo(featherLayer);
    }

    fetch('./data/cemetery_clean.geojson')
      .then(r => r.json())
      .then(gj => {
        const bounds = [];
        for (const f of gj.features) {
          const [lon, lat] = f.geometry.coordinates;
          const props = f.properties || {};
          const marker = L.circleMarker([lat, lon], styleFor(props.point_type));
          marker.bindPopup(popupHtml(props));
          bounds.push([lat, lon]);

          if (props.point_type === 'surface') marker.addTo(surfaceLayer);
          else if (props.point_type === 'subterranean') marker.addTo(subterraneanLayer);
          else marker.addTo(anchorLayer);
        }

        if (bounds.length) map.fitBounds(bounds, { padding: [20, 20] });
      })
      .catch(err => {
        console.error(err);
        alert('Could not load GeoJSON data. Ensure docs/data/cemetery_clean.geojson exists.');
      });

    L.control.layers(
      {
        'OpenTopoMap': topo,
        'OpenStreetMap': osm
      },
      {
        'Relief hillshade': hillshade,
        'Surface Stones': surfaceLayer,
        'Subterranean Points': subterraneanLayer,
        'Anchor Coordinates': anchorLayer
      },
      { collapsed: false }
    ).addTo(map);

    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <div><span class="dot" style="background:#f59e0b"></span>Surface stone</div>
        <div><span class="dot" style="background:#16a34a"></span>Subterranean point</div>
        <div><span class="dot" style="background:#ef4444"></span>Anchor/control point</div>
      `;
      return div;
    };
    legend.addTo(map);

    initOverviewCard();
  </script>
</body>
</html>
