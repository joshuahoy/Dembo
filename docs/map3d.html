<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>St. Andrew's Point Cemetery - 3D Terrain Map</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    :root {
      --ink: #12202a;
      --panel: rgba(255, 251, 244, 0.95);
      --edge: #cebfa8;
    }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: "Segoe UI", Tahoma, sans-serif; color: var(--ink); }
    #map { position: absolute; inset: 0; }
    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      padding: 10px 12px;
      max-width: min(92vw, 420px);
      font-size: 13px;
      line-height: 1.35;
    }
    h1 { margin: 0 0 6px; font-size: 15px; }
    .controls { margin-top: 9px; display: grid; gap: 7px; }
    .row { display: flex; align-items: center; gap: 8px; }
    .row label { min-width: 128px; font-weight: 600; }
    .row select, .row input[type="range"] { flex: 1; }
    .legend { margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
    .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <h1>St. Andrew's Point - 3D Terrain</h1>
    <div>Topographic basemap with local NRCan 1m terrain and no API keys.</div>
    <div class="controls">
      <div class="row">
        <label for="basemapSel">Basemap</label>
        <select id="basemapSel">
          <option value="topo" selected>OpenTopoMap</option>
          <option value="osm">OpenStreetMap</option>
        </select>
      </div>
      <div class="row">
        <label for="exaggeration">Terrain exaggeration</label>
        <input id="exaggeration" type="range" min="1" max="3" value="1.55" step="0.05" />
      </div>
    </div>
    <div class="legend">
      <span><span class="swatch" style="background:#f59e0b"></span>Surface</span>
      <span><span class="swatch" style="background:#22c55e"></span>Subterranean</span>
      <span><span class="swatch" style="background:#ef4444"></span>Anchor</span>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      center: [-62.52552, 46.15973],
      zoom: 16.8,
      pitch: 65,
      bearing: 18,
      maxPitch: 80,
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '© OpenStreetMap contributors'
          },
          topo: {
            type: 'raster',
            tiles: ['https://a.tile.opentopomap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 17,
            attribution: '© OpenStreetMap contributors, SRTM | Map style: OpenTopoMap (CC-BY-SA)'
          },
          terrain: {
            type: 'raster-dem',
            tiles: ['./tiles/nrcan_dem_terrarium/{z}/{x}/{y}.png'],
            tileSize: 256,
            encoding: 'terrarium',
            maxzoom: 16,
            attribution: 'Elevation: NRCan HRDEM 1m (PEI 2020), terrarium encoding (local)'
          }
        },
        layers: [
          { id: 'topo', type: 'raster', source: 'topo' },
          {
            id: 'terrain-hillshade',
            type: 'hillshade',
            source: 'terrain',
            paint: {
              'hillshade-exaggeration': 0.55,
              'hillshade-highlight-color': '#f9f6ee',
              'hillshade-shadow-color': '#53493d',
              'hillshade-accent-color': '#87765f'
            }
          }
        ],
        terrain: { source: 'terrain', exaggeration: 1.55 }
      }
    });

    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');
    map.setFog({
      range: [0.5, 8],
      color: '#f5efe3',
      'high-color': '#fff8ed',
      'space-color': '#f7f3e9'
    });

    const basemapSel = document.getElementById('basemapSel');
    const exaggeration = document.getElementById('exaggeration');

    function setBasemap(name) {
      const topoVisible = name === 'topo' ? 'visible' : 'none';
      const osmVisible = name === 'osm' ? 'visible' : 'none';
      if (map.getLayer('topo')) map.setLayoutProperty('topo', 'visibility', topoVisible);
      if (map.getLayer('osm')) map.setLayoutProperty('osm', 'visibility', osmVisible);
    }

    basemapSel.addEventListener('change', () => setBasemap(basemapSel.value));
    exaggeration.addEventListener('input', () => {
      const value = Number(exaggeration.value);
      map.setTerrain({ source: 'terrain', exaggeration: value });
    });

    function colorFor(type) {
      if (type === 'surface') return '#f59e0b';
      if (type === 'subterranean') return '#22c55e';
      return '#ef4444';
    }

    map.on('load', async () => {
      if (!map.getLayer('osm')) {
        map.addLayer({ id: 'osm', type: 'raster', source: 'osm' }, 'topo');
        setBasemap(basemapSel.value);
      }

      const response = await fetch('./data/cemetery_clean.geojson');
      const gj = await response.json();

      const styled = {
        type: 'FeatureCollection',
        features: gj.features.map((f) => ({
          ...f,
          properties: {
            ...f.properties,
            markerColor: colorFor(f.properties?.point_type)
          }
        }))
      };

      map.addSource('cemetery-points', { type: 'geojson', data: styled });

      map.addLayer({
        id: 'point-halo',
        type: 'circle',
        source: 'cemetery-points',
        paint: {
          'circle-color': '#081018',
          'circle-radius': [
            'interpolate', ['linear'], ['zoom'],
            14, 2,
            18, 4
          ],
          'circle-opacity': 0.6
        }
      });

      map.addLayer({
        id: 'point-core',
        type: 'circle',
        source: 'cemetery-points',
        paint: {
          'circle-color': ['get', 'markerColor'],
          'circle-radius': [
            'interpolate', ['linear'], ['zoom'],
            14, 1.5,
            18, 3
          ],
          'circle-opacity': 0.95,
          'circle-stroke-width': 0.5,
          'circle-stroke-color': '#ffffff'
        }
      });

      map.on('click', 'point-core', (e) => {
        const feature = e.features && e.features[0];
        if (!feature) return;
        const p = feature.properties || {};
        const html = [
          `<b>${p.point_type || 'point'} #${p.point_id || ''}</b>`,
          `Sheet: ${p.source_sheet || '-'}`,
          `Grid (Y/X): ${p.northing_y || '-'} / ${p.easting_x || '-'}`,
          p.category ? `Category: ${p.category}` : null,
          p.grid_context ? `Context: ${p.grid_context}` : null
        ].filter(Boolean).join('<br>');

        new maplibregl.Popup({ closeButton: true })
          .setLngLat(e.lngLat)
          .setHTML(html)
          .addTo(map);
      });

      map.on('mouseenter', 'point-core', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'point-core', () => map.getCanvas().style.cursor = '');

      const bounds = new maplibregl.LngLatBounds();
      for (const f of styled.features) {
        const c = f.geometry.coordinates;
        bounds.extend([c[0], c[1]]);
      }
      if (!bounds.isEmpty()) {
        map.fitBounds(bounds, { padding: 50, duration: 1200, pitch: 62, bearing: 20 });
      }
    });
  </script>
</body>
</html>
